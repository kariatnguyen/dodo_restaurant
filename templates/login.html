<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - DoDo Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen bg-cover bg-center relative"
      style="background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

    <!-- Back button -->
    <div class="absolute top-0 left-0 p-6 z-10">
        <button class="flex items-center gap-2 text-white bg-white/20 px-4 py-2 rounded-xl backdrop-blur hover:bg-white/30 transition" onclick="window.location.href='/'">
            ← <span>Quay trở lại</span>
        </button>
    </div>

    <!-- Main -->
    <div class="relative h-full flex items-center justify-center">

        <!-- Card -->
        <form action="/login" method="POST">

            <div class="w-full max-w-md p-8 rounded-3xl 
                        bg-white/90 backdrop-blur-lg 
                        shadow-[0_20px_60px_rgba(0,0,0,0.5)] border border-white/30">

                <!-- Title -->
                <div class="text-center mb-6">
                    <h1 class="text-3xl font-extrabold text-gray-800">
                        Đăng nhập
                    </h1>
                    <p class="text-gray-500 mt-2 text-sm">
                        Nhân viên & quản lý hệ thống
                    </p>
                </div>

                <!-- Email / ID -->
                <div class="relative mb-4">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        👤
                    </span>
                    <input
                        type="text"
                        name="username"
                        placeholder="ID nhân viên hoặc Email"
                        required
                        class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 
                            focus:outline-none focus:ring-2 focus:ring-orange-400 transition"
                    >
                </div>

                <!-- Password -->
                <div class="relative mb-2">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        🔒
                    </span>
                    <input
                        type="password"
                        name="password"
                        placeholder="Mật khẩu"
                        required
                        class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 
                            focus:outline-none focus:ring-2 focus:ring-orange-400 transition"
                    >
                </div>

                <!-- Forgot password -->
                <div class="text-right mb-5">
                    {% if error %}
                        <p class="text-xs text-red-500">
                            {{ error }}
                        </p>
                    {% endif %}
                    <a href="#" class="text-sm text-orange-500 hover:underline">
                        Quên mật khẩu?
                    </a>
                </div>

                <!-- Button -->
                <button
                    type="submit"
                    class="w-full py-3 rounded-xl font-semibold text-white text-lg
                        bg-gradient-to-r from-orange-500 to-red-500
                        hover:from-orange-600 hover:to-red-600
                        active:scale-95 transition duration-200 shadow-lg">
                    Đăng nhập
                </button>

                <!-- Note -->
                <p class="text-xs text-gray-400 text-center mt-6">
                    Chỉ dành cho nhân viên hệ thống
                </p>

            </div>

        </form>
    </div>

</body>
</html>
</html>
